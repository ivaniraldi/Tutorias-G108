<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Código secreto</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body
    style="
      background-image: url(&quot;https://texturelabs.org/wp-content/uploads/Texturelabs_Metal_136S.jpg&quot;);
      background-repeat: no-repeat;
      background-position: center;
      min-height: 100vh;
    "
  >
    <div
      style="height: 100vh"
      class="container d-flex justify-content-center align-items-center"
    >
      <div>
        <div class="d-flex justify-content-center gap-3">
          <input class="form-control" type="number" id="num1" />
          <input class="form-control" type="number" id="num2" />
          <input class="form-control" type="number" id="num3" />
        </div>
        <div class="mt-3 d-flex justify-content-center">
          <button 
            class="btn btn-secondary"
            onclick="


            let codigo1 = 465
            let codigo2 = 951


            let input1 = document.querySelector('#num1').value //LOS INPUT SIEMPRE DEVUELVEN STRINGS '4'
            let input2 = document.querySelector('#num2').value // '6'
            let input3 = document.querySelector('#num3').value // '5'
            
            let codigoIngresado = input1 + input2 + input3 // '465' 


            console.log(codigoIngresado)
          
            if(codigoIngresado == codigo1 || codigoIngresado == codigo2 ){ 
              alert('Codigo correcto! 🔓')
              let premio = document.querySelector('#premio')
              premio.innerHTML = 'Premio desbloqueado'

            }else{
              alert('Codigo Incorrecto! 😢')
            }

            
            "
          >Desbloquear</button>
        </div>
        <div class="text-primary text-center h2 text-decoration-underline">
          <p id="premio"></p>
        </div>
      </div>
    </div>


    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
