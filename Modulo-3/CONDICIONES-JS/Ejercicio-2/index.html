<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bombilla de luz</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <style>
    .bombilla {
      width: 200px;
      height: 200px;
      background-repeat: no-repeat;
      background-size: cover;
      background-position: center;
      background-color: black;
    }
  </style>
  <link rel="stylesheet" href="./assets/css/style.css">
  </head>

  
  <body>

    <h1 id="titulo" class="titulo" onclick='
        let titulo = document.querySelector("#titulo")
        if(titulo.style.textDecoration == "underline"){
            titulo.style.textDecoration = "none"
        }else{
            titulo.style.textDecoration = "underline"
        }
        '>Ejercicios de la tutoría</h1>
    
    <div
      class="container d-flex flex-column align-items-center justify-content-center"
    >
      <div style="background-color: black;" class="bombilla"></div>
      <div class="d-flex justify-content-center">
        <button
          class="btn btn-primary"
          onclick='
          
            let bombilla = document.querySelector(".bombilla")

            console.log(bombilla.style.backgroundColor)

            if(bombilla.style.backgroundColor == "black"){
                bombilla.style.backgroundColor = "yellow"
            }else{
                bombilla.style.backgroundColor = "black"
            }
                
          '
        >
          Encender / Apagar
        </button>
      </div>
    </div>

    <img width="200" style="border: none;" src="https://random.dog/9ff0ffc6-f6f0-4d7a-80c2-5df0ac437d5e.JPG" alt="" id="imgBordes"
        onclick="
            let imagen = document.querySelector('#imgBordes')
            if(imagen.style.border == 'none'){
                imagen.style.border = '2px solid red'
                imagen.style.borderRadius = '100%'
            }else{
                imagen.style.border = 'none'
                imagen.style.borderRadius = '0%'
            }
        "
    
    >

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    
  </body>
</html>
